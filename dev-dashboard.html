<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>♠</text></svg>">
<title>Daily Solitaire — Dev Console</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Lilita+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#070510;--panel:#0d0b1e;
  --pink:#ff3d9a;--blue:#3df0ff;--gold:#ffd700;--green:#39ff14;--red:#ff3344;
  --gp:0 0 8px #ff3d9a,0 0 24px #ff3d9a44;
  --gg:0 0 8px #ffd700,0 0 24px #ffd70044;
  --border:rgba(255,61,154,.15);
  --text:rgba(255,255,255,.72);--muted:rgba(255,255,255,.3);
}
html,body{min-height:100%;background:var(--bg);font-family:'DM Mono',monospace;color:var(--text)}
body{padding-bottom:60px}
body::before{content:'';position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 50% 0%,rgba(70,10,140,.4) 0%,transparent 65%);z-index:0}

header{
  position:sticky;top:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 24px;
  background:rgba(7,5,16,.97);border-bottom:1px solid var(--border);
  backdrop-filter:blur(10px);
}
.hlogo{font-family:'Lilita One',sans-serif;font-size:18px;background:linear-gradient(130deg,#ff3d9a,#ffd700,#3df0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(255,61,154,.6))}
.hbadge{background:rgba(255,61,154,.12);border:1px solid rgba(255,61,154,.3);border-radius:6px;padding:3px 10px;font-size:10px;color:var(--pink);letter-spacing:.12em;text-transform:uppercase}
.hdate{font-size:11px;color:var(--blue);text-shadow:0 0 8px var(--blue)}

main{position:relative;z-index:1;padding:22px 24px;max-width:1100px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:16px}
.full{grid-column:1/-1}

/* ── PANELS ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,61,154,.35),transparent)}
.pt{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);font-weight:500;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-p{background:var(--pink);box-shadow:0 0 8px var(--pink)}
.dot-b{background:var(--blue);box-shadow:0 0 8px var(--blue)}
.dot-g{background:var(--gold);box-shadow:0 0 8px var(--gold)}
.dot-gr{background:var(--green);box-shadow:0 0 8px var(--green)}
.dot-r{background:var(--red);box-shadow:0 0 8px var(--red)}

/* ── STAT GRID ── */
.sg{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.sb{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.07);border-radius:10px;padding:12px 14px;text-align:center}
.sv{font-family:'Lilita One',sans-serif;font-size:28px;line-height:1;margin-bottom:3px}
.sl{font-size:8.5px;text-transform:uppercase;letter-spacing:.12em;color:var(--muted);font-weight:500}
.sv-p{color:var(--pink);text-shadow:var(--gp)}
.sv-g{color:var(--gold);text-shadow:var(--gg)}
.sv-b{color:var(--blue);text-shadow:0 0 8px var(--blue)}
.sv-gr{color:var(--green);text-shadow:0 0 8px var(--green)}

/* ── BUTTONS ── */
.btn{padding:8px 15px;border-radius:8px;font-family:'Nunito',sans-serif;font-weight:900;font-size:11px;letter-spacing:.05em;cursor:pointer;border:none;transition:all .12s;text-transform:uppercase}
.btn:active{transform:scale(.97)}
.btn-out{background:transparent;border:1px solid rgba(255,255,255,.18);color:rgba(255,255,255,.55)}
.btn-out:hover{border-color:rgba(255,255,255,.45);color:#fff}
.btn-pink{background:linear-gradient(135deg,#ff3d9a,#b5005e);color:#fff;box-shadow:var(--gp)}
.btn-blue{background:linear-gradient(135deg,#3df0ff,#0090aa);color:#070510}
.btn-gold{background:linear-gradient(135deg,#ffd700,#ff8c00);color:#070510}
.btn-red{background:rgba(255,51,68,.12);border:1px solid rgba(255,51,68,.3);color:var(--red)}
.btn-red:hover{background:rgba(255,51,68,.22)}
.btn-sm{padding:5px 10px;font-size:10px}

/* ── INPUTS ── */
.inp{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-radius:8px;padding:8px 12px;color:#fff;font-family:'DM Mono',monospace;font-size:12px;outline:none;transition:border-color .15s;width:100%}
.inp:focus{border-color:var(--pink);box-shadow:0 0 0 2px rgba(255,61,154,.12)}
.inp-label{font-size:9px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;display:block}
.field{margin-bottom:10px}

/* ── PLAYER CARD ── */
#player-result{display:none;margin-top:14px}
.pc{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:16px}
.pc-top{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px;flex-wrap:wrap}
.pc-av{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;font-family:'Lilita One',sans-serif;font-size:20px;background:linear-gradient(135deg,#ff3d9a,#ffd700);color:#120820;flex-shrink:0}
.pc-info{flex:1}
.pc-name{font-family:'Lilita One',sans-serif;font-size:18px;color:#fff;line-height:1}
.pc-id{font-size:10px;color:var(--pink);letter-spacing:.06em;margin-top:3px}
.pc-joined{font-size:10px;color:var(--muted);margin-top:2px}

/* edit grid */
.edit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.edit-grid .field{margin-bottom:0}
.edit-row{display:flex;gap:8px;align-items:center;margin-top:4px}

/* ── LEADERBOARD ── */
.lb-table{width:100%;border-collapse:collapse;font-size:11px}
.lb-table th{text-align:left;font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);padding:0 0 8px;font-weight:500;border-bottom:1px solid rgba(255,255,255,.07)}
.lb-table td{padding:7px 0;border-bottom:1px solid rgba(255,255,255,.04);font-weight:400}
.lb-table tr:last-child td{border-bottom:none}
.rank-badge{display:inline-block;padding:1px 8px;border-radius:5px;font-size:9px;font-weight:700}
.r1{background:rgba(255,215,0,.15);color:var(--gold);border:1px solid rgba(255,215,0,.3)}
.r2{background:rgba(61,240,255,.1);color:var(--blue);border:1px solid rgba(61,240,255,.25)}
.r3{background:rgba(255,61,154,.1);color:var(--pink);border:1px solid rgba(255,61,154,.25)}
.rn{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid rgba(255,255,255,.1)}
.score-val{font-family:'Lilita One',sans-serif;font-size:15px;color:var(--gold)}

/* ── HISTOGRAM ── */
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;font-size:10px}
.bar-lbl{width:55px;text-align:right;color:var(--muted);flex-shrink:0}
.bar-track{flex:1;height:16px;background:rgba(255,255,255,.05);border-radius:3px;overflow:hidden}
.bar-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,#ff3d9a,#ffd700);transition:width .6s cubic-bezier(.22,1,.36,1);position:relative}
.bar-fill::after{content:attr(data-n);position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:8.5px;color:rgba(255,255,255,.8)}
.bar-cnt{width:24px;text-align:left;color:var(--muted);font-size:9px;flex-shrink:0}

/* ── LOG ── */
#log{background:rgba(0,0,0,.3);border-radius:8px;padding:10px 12px;font-size:10px;color:var(--muted);max-height:140px;overflow-y:auto;margin-top:10px;line-height:1.9}
.lg-ok{color:var(--green)}
.lg-w{color:var(--gold)}
.lg-e{color:var(--red)}
.lg-i{color:var(--blue)}

/* ── STATUS ── */
.status{padding:8px 12px;border-radius:8px;font-size:11px;margin-top:8px;display:none}
.status.ok{display:block;background:rgba(57,255,20,.08);border:1px solid rgba(57,255,20,.25);color:var(--green)}
.status.err{display:block;background:rgba(255,51,68,.08);border:1px solid rgba(255,51,68,.25);color:var(--red)}

.row{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:10px}
.loading{color:var(--muted);font-size:11px;animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,61,154,.3);border-radius:4px}
</style>
</head>
<body>

<header>
  <div class="hlogo">DEV CONSOLE</div>
  <div class="hdate" id="now"></div>
  <div class="hbadge">Admin Only</div>
</header>

<main>

  <!-- TODAY'S STATS -->
  <div class="panel full">
    <div class="pt"><div class="dot dot-g"></div>Today's Live Stats</div>
    <div class="sg">
      <div class="sb"><div class="sv sv-p" id="st-players">—</div><div class="sl">Players Today</div></div>
      <div class="sb"><div class="sv sv-g" id="st-top">—</div><div class="sl">Top Score</div></div>
      <div class="sb"><div class="sv sv-b" id="st-avg">—</div><div class="sl">Avg Score</div></div>
      <div class="sb"><div class="sv sv-gr" id="st-seed">—</div><div class="sl">Today's Seed</div></div>
    </div>
    <div class="row"><button class="btn btn-out" onclick="loadAll()">↻ Refresh</button></div>
  </div>

  <!-- PLAYER LOOKUP -->
  <div class="panel">
    <div class="pt"><div class="dot dot-p"></div>Player Lookup &amp; Edit</div>
    <div class="field">
      <label class="inp-label">Search by Username or Player ID</label>
      <input class="inp" id="lookup-q" placeholder="e.g. tom or DS-A3B4C5D6" autocapitalize="none" spellcheck="false">
    </div>
    <button class="btn btn-pink" onclick="lookupPlayer()">Look Up Player</button>

    <div id="player-result">
      <div class="pc">
        <div class="pc-top">
          <div style="display:flex;gap:10px;align-items:center">
            <div class="pc-av" id="pc-av">?</div>
            <div class="pc-info">
              <div class="pc-name" id="pc-name">—</div>
              <div class="pc-id" id="pc-id">—</div>
              <div class="pc-joined" id="pc-joined">—</div>
            </div>
          </div>
        </div>

        <div class="edit-grid">
          <div class="field">
            <label class="inp-label">Streak (days)</label>
            <input class="inp" id="edit-streak" type="number" min="0" max="9999">
          </div>
          <div class="field">
            <label class="inp-label">Best Streak</label>
            <input class="inp" id="edit-beststreak" type="number" min="0" max="9999">
          </div>
          <div class="field">
            <label class="inp-label">Total Wins</label>
            <input class="inp" id="edit-wins" type="number" min="0" max="99999">
          </div>
          <div class="field">
            <label class="inp-label">Best Score</label>
            <input class="inp" id="edit-bestscore" type="number" min="0">
          </div>
          <div class="field">
            <label class="inp-label">Last Win Date (YYYY-M-D)</label>
            <input class="inp" id="edit-lastwin" placeholder="e.g. 2026-4-26">
          </div>
          <div class="field">
            <label class="inp-label">Player ID (read-only)</label>
            <input class="inp" id="edit-pid" readonly style="opacity:.5;cursor:default">
          </div>
        </div>

        <div class="row">
          <button class="btn btn-gold" onclick="savePlayerEdits()">Save Changes</button>
          <button class="btn btn-out" onclick="resetStreak()">Reset Streak to 0</button>
          <button class="btn btn-red btn-sm" onclick="confirmDeletePlayer()">Delete Account</button>
        </div>
        <div class="status" id="edit-status"></div>
      </div>
    </div>
  </div>

  <!-- LEADERBOARD -->
  <div class="panel">
    <div class="pt"><div class="dot dot-p"></div>Today's Leaderboard</div>
    <div id="lb-wrap"><div class="loading">Loading scores…</div></div>
  </div>

  <!-- SCORE HISTOGRAM -->
  <div class="panel">
    <div class="pt"><div class="dot dot-b"></div>Score Distribution</div>
    <div id="hist"><div class="loading">Loading…</div></div>
  </div>

  <!-- DANGER ZONE -->
  <div class="panel full">
    <div class="pt"><div class="dot dot-r"></div>Danger Zone</div>
    <div class="row">
      <button class="btn btn-red" onclick="clearTodayScores()">Clear Today's Scores</button>
      <button class="btn btn-red" onclick="clearTodayLock()">Clear Today's Played Locks</button>
      <button class="btn btn-red" onclick="clearAllScores()">⚠ Clear ALL Score Data</button>
    </div>
    <div id="log"></div>
  </div>

</main>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs, query, where }
  from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC0tOre1U08m4VPaAkgPg89HO0Ir6BzCLQ",
  authDomain: "daily-solitaire.firebaseapp.com",
  projectId: "daily-solitaire",
  storageBucket: "daily-solitaire.firebasestorage.app",
  messagingSenderId: "790954634339",
  appId: "1:790954634339:web:6154ff6ec0663d684fdc56"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// ── HELPERS ──────────────────────────────────────
function getDK() { const n=new Date(); return `sol_${n.getFullYear()}_${n.getMonth()+1}_${n.getDate()}`; }
function uKey(u) { return 'users/' + u.toLowerCase().replace(/[^a-z0-9_]/g,''); }
function fmt(n) { return Number(n).toLocaleString(); }
function fmtDate(ts) { return ts ? new Date(ts).toLocaleDateString('en-GB',{day:'numeric',month:'short',year:'numeric'}) : '—'; }

function log(msg, type='i') {
  const el = document.getElementById('log');
  const d = document.createElement('div'); d.className = `lg-${type}`;
  d.textContent = `[${new Date().toLocaleTimeString()}] ${msg}`;
  el.appendChild(d); el.scrollTop = el.scrollHeight;
}
function setStatus(id, msg, ok) {
  const el = document.getElementById(id);
  el.textContent = msg; el.className = `status ${ok?'ok':'err'}`;
}

// ── DAILY STATS ──────────────────────────────────
async function loadTodayStats() {
  try {
    const snap = await getDoc(doc(db, 'scores', getDK()));
    const scores = snap.exists() ? (snap.data().scores||[]).map(x=>x.score) : [];
    const n = scores.length;
    document.getElementById('st-players').textContent = n||'0';
    document.getElementById('st-top').textContent = n ? fmt(Math.max(...scores)) : '—';
    document.getElementById('st-avg').textContent = n ? fmt(~~(scores.reduce((a,b)=>a+b,0)/n)) : '—';
    // seed calc
    const base = new Date(); const b = base.getFullYear()*10000+(base.getMonth()+1)*100+base.getDate();
    document.getElementById('st-seed').textContent = b+'xxx';
  } catch(e) { log('Stats error: '+e,'e'); }
}

async function loadLeaderboard() {
  const wrap = document.getElementById('lb-wrap');
  try {
    const snap = await getDoc(doc(db, 'scores', getDK()));
    const scores = snap.exists() ? (snap.data().scores||[]) : [];
    if (!scores.length) { wrap.innerHTML = '<div style="font-size:11px;color:var(--muted)">No scores yet.</div>'; return; }
    scores.sort((a,b) => b.score-a.score);
    const top = scores.slice(0,15);
    let html = '<table class="lb-table"><thead><tr><th>Rank</th><th>Score</th><th>Time</th></tr></thead><tbody>';
    top.forEach((e,i) => {
      const rc = i===0?'r1':i===1?'r2':i===2?'r3':'rn';
      const rl = i===0?'🥇 1st':i===1?'🥈 2nd':i===2?'🥉 3rd':`#${i+1}`;
      const t = e.ts ? new Date(e.ts).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'}) : '—';
      html += `<tr><td><span class="rank-badge ${rc}">${rl}</span></td><td><span class="score-val">${fmt(e.score)}</span></td><td style="color:var(--muted)">${t}</td></tr>`;
    });
    html += '</tbody></table>';
    if (scores.length > 15) html += `<div style="font-size:9.5px;color:var(--muted);margin-top:7px">+${scores.length-15} more</div>`;
    wrap.innerHTML = html;
  } catch(e) { wrap.innerHTML='<div class="loading">Error.</div>'; log('LB error: '+e,'e'); }
}

async function loadHistogram() {
  const el = document.getElementById('hist');
  try {
    const snap = await getDoc(doc(db, 'scores', getDK()));
    const scores = snap.exists() ? (snap.data().scores||[]).map(x=>x.score) : [];
    if (!scores.length) { el.innerHTML='<div style="font-size:11px;color:var(--muted)">No data yet.</div>'; return; }
    const buckets = [{l:'0–500',min:0,max:500},{l:'500–1k',min:500,max:1000},{l:'1k–1.5k',min:1000,max:1500},{l:'1.5k–2k',min:1500,max:2000},{l:'2k+',min:2000,max:Infinity}];
    const counts = buckets.map(b=>scores.filter(s=>s>=b.min&&s<b.max).length);
    const mx = Math.max(...counts,1);
    el.innerHTML = buckets.map((b,i)=>`<div class="bar-row"><div class="bar-lbl">${b.l}</div><div class="bar-track"><div class="bar-fill" data-n="${counts[i]}" style="width:${~~(counts[i]/mx*100)}%"></div></div><div class="bar-cnt">${counts[i]}</div></div>`).join('');
  } catch(e) { el.innerHTML='<div class="loading">Error.</div>'; log('Hist error: '+e,'e'); }
}

window.loadAll = async function() {
  await Promise.all([loadTodayStats(), loadLeaderboard(), loadHistogram()]);
  log('Refreshed all data','i');
};

// ── PLAYER LOOKUP ────────────────────────────────
let _currentPlayerUsername = null;

window.lookupPlayer = async function() {
  const q = document.getElementById('lookup-q').value.trim();
  if (!q) return;
  const resultEl = document.getElementById('player-result');
  resultEl.style.display = 'none';
  setStatus('edit-status','','ok');

  try {
    let username = null;
    let data = null;

    // If it looks like a player ID (starts with DS-)
    if (q.toUpperCase().startsWith('DS-')) {
      // Scan users collection for matching playerId
      log(`Searching by player ID: ${q.toUpperCase()}…`,'i');
      // We store users as /users/{username}/profile — need to list them
      // Firestore doesn't support collection group queries without an index
      // so we'll use a dedicated lookup doc: /playerIds/{id} -> username
      const idSnap = await getDoc(doc(db, 'playerIds', q.toUpperCase()));
      if (!idSnap.exists()) { log(`Player ID not found: ${q}`,'e'); alert('Player ID not found. Make sure to use the exact ID.'); return; }
      username = idSnap.data().username;
    } else {
      username = q.toLowerCase().replace(/[^a-z0-9_]/g,'');
    }

    const snap = await getDoc(doc(db, uKey(username), 'profile'));
    if (!snap.exists()) { log(`User not found: ${username}`,'e'); alert(`No account found for "${username}".`); return; }
    data = snap.data();
    _currentPlayerUsername = username;

    // Populate UI
    document.getElementById('pc-av').textContent = username[0].toUpperCase();
    document.getElementById('pc-name').textContent = username;
    document.getElementById('pc-id').textContent = data.playerId || '— (legacy account, no ID)';
    document.getElementById('pc-joined').textContent = 'Joined ' + fmtDate(data.created);

    const s = data.stats || {};
    document.getElementById('edit-streak').value = s.streak || 0;
    document.getElementById('edit-beststreak').value = s.bestStreak || 0;
    document.getElementById('edit-wins').value = s.wins || 0;
    document.getElementById('edit-bestscore').value = s.bestScore || 0;
    document.getElementById('edit-lastwin').value = s.lastWinDate || '';
    document.getElementById('edit-pid').value = data.playerId || '—';

    resultEl.style.display = 'block';
    log(`Loaded player: ${username} (${data.playerId||'no ID'})`,'ok');
  } catch(e) { log('Lookup error: '+e,'e'); alert('Error looking up player. Check console.'); }
};

window.savePlayerEdits = async function() {
  if (!_currentPlayerUsername) return;
  try {
    const streak = parseInt(document.getElementById('edit-streak').value)||0;
    const bestStreak = parseInt(document.getElementById('edit-beststreak').value)||0;
    const wins = parseInt(document.getElementById('edit-wins').value)||0;
    const bestScore = parseInt(document.getElementById('edit-bestscore').value)||0;
    const lastWinDate = document.getElementById('edit-lastwin').value.trim();

    const ref = doc(db, uKey(_currentPlayerUsername), 'profile');
    const snap = await getDoc(ref);
    if (!snap.exists()) { setStatus('edit-status','User no longer exists','err'); return; }
    const existing = snap.data();
    existing.stats = { ...existing.stats, streak, bestStreak, wins, bestScore, lastWinDate };
    await setDoc(ref, existing);

    setStatus('edit-status',`✓ Saved — streak: ${streak}, wins: ${wins}, bestScore: ${fmt(bestScore)}`,'ok');
    log(`Updated ${_currentPlayerUsername}: streak=${streak}, wins=${wins}, bestScore=${bestScore}`,'ok');
  } catch(e) { setStatus('edit-status','Error saving: '+e.message,'err'); log('Save error: '+e,'e'); }
};

window.resetStreak = async function() {
  if (!_currentPlayerUsername) return;
  if (!confirm(`Reset streak to 0 for ${_currentPlayerUsername}?`)) return;
  document.getElementById('edit-streak').value = '0';
  document.getElementById('edit-lastwin').value = '';
  await window.savePlayerEdits();
  log(`Reset streak for ${_currentPlayerUsername}`,'w');
};

window.confirmDeletePlayer = async function() {
  if (!_currentPlayerUsername) return;
  const pid = document.getElementById('edit-pid').value;
  if (!confirm(`DELETE account "${_currentPlayerUsername}" (${pid})?\n\nThis cannot be undone.`)) return;
  if (!confirm(`Are you absolutely sure? Type YES in the next prompt.`)) return;
  const conf = prompt('Type YES to confirm deletion:');
  if (conf !== 'YES') { alert('Deletion cancelled.'); return; }
  try {
    await deleteDoc(doc(db, uKey(_currentPlayerUsername), 'profile'));
    // Also remove the playerIds lookup doc
    if (pid && pid !== '—') await deleteDoc(doc(db, 'playerIds', pid));
    document.getElementById('player-result').style.display = 'none';
    _currentPlayerUsername = null;
    log(`Deleted account: ${_currentPlayerUsername}`,'e');
    alert('Account deleted.');
  } catch(e) { log('Delete error: '+e,'e'); }
};

// ── DANGER ZONE ──────────────────────────────────
window.clearTodayScores = async function() {
  if (!confirm('Clear ALL scores for today?')) return;
  try {
    await deleteDoc(doc(db, 'scores', getDK()));
    log('Today scores cleared','w');
    await loadAll();
  } catch(e) { log('Error: '+e,'e'); }
};

window.clearTodayLock = async function() {
  if (!confirm('This clears played locks — players can replay today. Continue?')) return;
  // Played locks are in localStorage on each device, not in Firestore
  // The admin can't clear localStorage on other devices — inform them
  alert('Played locks are stored in each player\'s browser localStorage — they can\'t be cleared remotely. Ask the player to clear their browser data, or use the dev override below.\n\nTo override for your own device: open browser console and run:\nlocalStorage.removeItem("' + getDK() + '_played")');
  log('Note: played locks are device-local (localStorage), not in Firestore','w');
};

window.clearAllScores = async function() {
  if (!confirm('⚠ Clear ALL solitaire score data? This cannot be undone.')) return;
  if (!confirm('Last chance — are you sure?')) return;
  try {
    // Delete all docs in scores collection (Firestore doesn't have a bulk delete,
    // so we list and delete individually)
    const scoresSnap = await getDocs(collection(db, 'scores'));
    const deletes = scoresSnap.docs.map(d => deleteDoc(d.ref));
    await Promise.all(deletes);
    log(`Deleted ${scoresSnap.size} score documents`,'e');
    await loadAll();
  } catch(e) { log('Error: '+e,'e'); }
};

// ── ENTER KEY on lookup ──────────────────────────
document.getElementById('lookup-q').addEventListener('keydown', e => {
  if (e.key === 'Enter') window.lookupPlayer();
});

// ── DATE HEADER ──────────────────────────────────
(function() {
  const n = new Date();
  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  document.getElementById('now').textContent = `${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
})();

// ── INIT ──────────────────────────────────────────
loadAll();
setInterval(loadTodayStats, 30000);
</script>
