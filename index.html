<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ranked Solitaire</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
/* (All your original CSS - unchanged) */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--cw:62px;--ch:87px;--cr:8px;--gap:6px;--pad:8px}
html,body{height:100%;overflow:hidden;background:#080613;color:#fff;font-family:'Nunito',sans-serif}
.card{width:var(--cw);height:var(--ch);border-radius:var(--cr);position:absolute;border:2px solid rgba(255,255,255,.15)}
.card.dn{background:linear-gradient(145deg,#1a0538,#0a021a);border-color:rgba(255,61,154,.45)}
.card.up{background:linear-gradient(160deg,#fffef8,#f5ede8);box-shadow:0 4px 20px rgba(0,0,0,.65)}
.slot{width:var(--cw);height:var(--ch);border:1.5px dashed rgba(61,240,255,.3);background:rgba(61,240,255,.025);border-radius:var(--cr)}
.tcol{width:var(--cw);position:relative}
#tab{display:flex;gap:var(--gap);flex:1}
@keyframes dealFly{0%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(.6)}100%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}}
.card.deal-anim{animation:dealFly .38s cubic-bezier(.22,1,.36,1) both}
</style>
</head>
<body>

<div id="wrap" style="display:flex;flex-direction:column;height:100vh">
  <header style="padding:10px;display:flex;justify-content:space-between">
    <div>SOLITAIRE.fail</div>
    <button onclick="newGame()">New Game</button>
  </header>

  <div id="game" style="flex:1;padding:10px;display:flex;flex-direction:column;gap:10px">
    <div id="toprow" style="display:flex;gap:8px">
      <div class="slot" id="stock" style="cursor:pointer"><div style="font-size:28px;color:#3df0ff">↺</div></div>
      <div class="slot" id="waste"></div>
      <div style="flex:1"></div>
      <div class="slot" id="f0"></div><div class="slot" id="f1"></div><div class="slot" id="f2"></div><div class="slot" id="f3"></div>
    </div>
    <div id="tab" style="display:flex;gap:6px;flex:1;overflow:auto"></div>
  </div>
</div>
