<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Solitaire Demo — Auto Play</title>
<link href="https://fonts.googleapis.com/css2?family=Lilita+One&family=Nunito:wght@700;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#080613;
  --pink:#ff3d9a;--blue:#3df0ff;--gold:#ffd700;
  --gp:0 0 8px #ff3d9a,0 0 28px #ff3d9a55;
  --gg:0 0 8px #ffd700,0 0 28px #ffd70055;
  --cw:68px;--ch:95px;--cr:9px;--gap:7px;--pad:10px;
  --fsize:12px;--ss:9px;--ms:28px;
  --play-w:520px;
  --hdr-h:56px;--banner-h:0px;
}
html,body{height:100%;overflow:hidden;touch-action:none;background:var(--bg);font-family:'Nunito',sans-serif;color:#fff;user-select:none}

body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:9990;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.08) 3px,rgba(0,0,0,.08) 4px);animation:scanroll 14s linear infinite}
@keyframes scanroll{from{background-position:0 0}to{background-position:0 400px}}
body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 120% 60% at 50% 50%,rgba(0,60,20,.7) 0%,transparent 65%),
    radial-gradient(ellipse 100% 40% at 50% 0%,rgba(80,10,140,.5) 0%,transparent 60%),
    radial-gradient(ellipse 60% 50% at 5% 110%,rgba(30,5,80,.8) 0%,transparent 60%);
}

/* stars */
#sf{position:fixed;inset:0;z-index:1;pointer-events:none;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--d,3s) var(--dl,0s) infinite alternate}
@keyframes twinkle{0%{opacity:.07;transform:scale(1)}100%{opacity:.8;transform:scale(1.5)}}

/* layout */
#wrap{display:flex;flex-direction:column;align-items:center;height:100vh;height:100dvh;overflow:hidden;position:relative;z-index:2}

header{
  position:relative;z-index:200;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;gap:12px;
  height:var(--hdr-h);padding:0 20px;width:100%;max-width:var(--play-w);
  border-bottom:1px solid rgba(255,61,154,.2);
  background:rgba(8,6,19,.97);backdrop-filter:blur(12px);
}
.logo{font-family:'Lilita One',sans-serif;font-size:22px;letter-spacing:.04em;line-height:1;background:linear-gradient(130deg,#ff3d9a,#ffd700,#3df0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 8px rgba(255,61,154,.7))}
.chip{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.09);border-radius:7px;padding:4px 12px;text-align:center}
.chip .v{font-family:'Lilita One',sans-serif;font-size:18px;line-height:1;color:var(--gold);text-shadow:var(--gg)}
.chip .l{font-size:7px;text-transform:uppercase;letter-spacing:.1em;color:rgba(255,255,255,.25);font-weight:700;margin-top:1px}


/* game */
#game{position:relative;z-index:10;flex:1;overflow:hidden;display:flex;flex-direction:column;gap:8px;padding:8px var(--pad) 6px;width:100%;max-width:var(--play-w)}
#toprow{display:flex;gap:var(--gap);align-items:flex-start;flex-shrink:0}
.sp{flex:1}
.fnds{display:flex;gap:var(--gap)}
.sw{display:flex;gap:var(--gap);align-items:flex-start}
#tab{display:flex;gap:var(--gap);flex:1;align-items:flex-start;overflow:hidden}
.tcol{width:var(--cw);flex-shrink:0;position:relative}

/* slots */
.slot{width:var(--cw);height:var(--ch);border-radius:var(--cr);border:1.5px dashed rgba(61,240,255,.2);background:rgba(61,240,255,.025);position:relative;flex-shrink:0;transition:all .18s}
.slot.hl{border-color:var(--gold);border-style:solid;background:rgba(255,215,0,.06);box-shadow:0 0 0 1px rgba(255,215,0,.3),0 0 20px rgba(255,215,0,.25)}
.si{position:absolute;inset:0;display:grid;place-items:center;font-size:20px;opacity:.15;pointer-events:none}
#scnt{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:7px;color:rgba(255,255,255,.2);font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap}

/* cards */
.card{width:var(--cw);height:var(--ch);border-radius:var(--cr);position:absolute;border:2px solid rgba(255,255,255,.15);will-change:transform}
.card.dn{
  background:radial-gradient(ellipse at 30% 25%,rgba(255,61,154,.18) 0%,transparent 55%),radial-gradient(ellipse at 70% 75%,rgba(61,240,255,.12) 0%,transparent 55%),linear-gradient(145deg,#1a0538,#0a021a,#1a0538);
  border-color:rgba(255,61,154,.45);box-shadow:0 4px 14px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.06);overflow:hidden;
}
.card.dn::before{content:'';position:absolute;inset:3px;border-radius:calc(var(--cr) - 2px);border:1px solid rgba(255,61,154,.25);background:repeating-linear-gradient(45deg,rgba(255,61,154,.04) 0,rgba(255,61,154,.04) 1px,transparent 1px,transparent 8px),repeating-linear-gradient(-45deg,rgba(61,240,255,.025) 0,rgba(61,240,255,.025) 1px,transparent 1px,transparent 8px)}
.card.dn::after{content:'♦';position:absolute;inset:0;display:grid;place-items:center;font-size:calc(var(--cw) * .35);background:linear-gradient(135deg,#ff3d9a,#ffd700,#3df0ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 6px rgba(255,61,154,.6))}
.card.up{background:linear-gradient(160deg,#fffef8 0%,#faf5f0 60%,#f5ede8 100%);box-shadow:0 4px 20px rgba(0,0,0,.65),0 1px 0 rgba(255,255,255,.98) inset;cursor:default}
.card.up.red{border-color:rgba(200,0,30,.55)}
.card.up.blk{border-color:rgba(10,5,25,.6)}
.cc{position:absolute;font-family:'Lilita One',sans-serif;padding:2px 3px;line-height:1;display:flex;flex-direction:column;align-items:center;gap:1px;pointer-events:none}
.cc.tl{top:0;left:0}.cc.br{bottom:0;right:0;transform:rotate(180deg)}
.cr{font-size:var(--fsize);line-height:1;display:block}.cs{font-size:var(--ss);line-height:1;display:block}
.card.red .cc,.card.red .cr,.card.red .cs{color:#cc0022;-webkit-text-fill-color:#cc0022}
.card.blk .cc,.card.blk .cr,.card.blk .cs{color:#0a0518;-webkit-text-fill-color:#0a0518}
.cmid{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:calc(var(--cw) * 0.46);line-height:1;pointer-events:none;opacity:.65}
.card.red .cmid{color:#cc0022;-webkit-text-fill-color:#cc0022}
.card.blk .cmid{color:#0a0518;-webkit-text-fill-color:#0a0518}

/* ghost cursor */
#cursor{
  position:fixed;z-index:9995;pointer-events:none;
  width:24px;height:24px;
  border-radius:50%;
  background:rgba(255,61,154,.3);
  border:2px solid rgba(255,61,154,.85);
  box-shadow:0 0 10px rgba(255,61,154,.5),0 0 24px rgba(255,61,154,.25);
  transform:translate(-50%,-50%);
  /* NO CSS transition — JS handles movement for human-like curves */
  display:none;
  transition:width .1s, height .1s, background .1s, box-shadow .1s;
}
#cursor.grabbing{
  width:18px;height:18px;
  background:rgba(255,61,154,.55);
  box-shadow:0 0 14px rgba(255,61,154,.7),0 0 30px rgba(255,61,154,.35);
}

/* flying card during drag demo */
#fly-card{position:fixed;z-index:9000;pointer-events:none;display:none;transition:left .22s cubic-bezier(.22,1,.36,1),top .22s cubic-bezier(.22,1,.36,1)}

/* animations */
@keyframes dealFly{0%{opacity:0;transform:translate(var(--dx),var(--dy)) rotate(var(--dr)) scale(.7)}65%{opacity:1;transform:translate(calc(var(--dx)*.03),calc(var(--dy)*.03)) rotate(calc(var(--dr)*.03)) scale(1.06)}100%{opacity:1;transform:translate(0,0) rotate(0) scale(1)}}
.card.deal-anim{animation:dealFly var(--dur,.3s) cubic-bezier(.22,1,.36,1) var(--del,0s) both}
@keyframes flipCard{0%{transform:rotateY(0) scale(1)}49%{transform:rotateY(90deg) scale(1.05)}51%{transform:rotateY(90deg) scale(1.05)}100%{transform:rotateY(0) scale(1)}}
.card.flipping{animation:flipCard .2s ease-in-out forwards}
@keyframes placeBounce{0%{transform:translateY(-14px) scale(1.08);filter:brightness(1.5)}40%{transform:translateY(4px) scale(.96)}70%{transform:translateY(-3px) scale(1.03)}100%{transform:translateY(0) scale(1)}}
.card.placed{animation:placeBounce .22s cubic-bezier(.22,1,.36,1) forwards}
@keyframes fndLand{0%{transform:scale(1.28) rotate(4deg);filter:brightness(2) drop-shadow(0 0 18px gold)}32%{transform:scale(.83) rotate(-2deg);filter:brightness(1.3)}62%{transform:scale(1.09) rotate(.8deg);filter:brightness(1.07)}100%{transform:scale(1) rotate(0) filter:brightness(1)}}
.card.fnd-pop{animation:fndLand .35s cubic-bezier(.22,1,.36,1) forwards}
@keyframes revealPop{0%{transform:scale(1);filter:brightness(1)}35%{transform:scale(1.15);filter:brightness(1.8) drop-shadow(0 0 10px var(--blue))}100%{transform:scale(1);filter:brightness(1)}}
.card.reveal-pop{animation:revealPop .25s cubic-bezier(.22,1,.36,1) forwards}

/* particles */
.part{position:fixed;pointer-events:none;z-index:9998;border-radius:50%;animation:pfloat linear forwards}
@keyframes pfloat{0%{transform:translate(0,0) scale(1);opacity:1}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0}}

/* combo words */
#combo-overlay{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9997;overflow:hidden}
@keyframes comboWord{0%{opacity:0;transform:scale(.4)}15%{opacity:1;transform:scale(1.35)}40%{opacity:1;transform:scale(1.0)}75%{opacity:1;transform:scale(1.05)}100%{opacity:0;transform:scale(.9) translateY(-30px)}}
.combo-word{position:absolute;font-family:'Lilita One',sans-serif;white-space:nowrap;text-align:center;animation:comboWord 1.2s cubic-bezier(.22,1,.36,1) forwards}

/* hot streak */
#hot-streak{position:fixed;bottom:60px;left:50%;transform:translateX(-50%);z-index:9996;pointer-events:none;display:flex;flex-direction:column;align-items:center;gap:4px;opacity:0;transition:opacity .3s}
#hot-streak.on{opacity:1}
#hs-label{font-family:'Lilita One',sans-serif;font-size:11px;letter-spacing:.12em;text-transform:uppercase;color:rgba(255,255,255,.5)}
#hs-dots{display:flex;gap:5px;align-items:center}
.hs-dot{width:10px;height:10px;border-radius:50%;background:rgba(255,255,255,.15);border:1.5px solid rgba(255,255,255,.2);transition:all .2s}
.hs-dot.lit{background:var(--dot-col,#ffd700);border-color:var(--dot-col,#ffd700);box-shadow:0 0 8px var(--dot-col,#ffd700);transform:scale(1.3)}

/* shockwave */
@keyframes shockwave{0%{transform:scale(0);opacity:1}100%{transform:scale(4);opacity:0}}
.shockwave{position:fixed;z-index:9993;pointer-events:none;border-radius:50%;animation:shockwave .65s cubic-bezier(.15,0,.85,1) forwards}
@keyframes suitFlash{0%{opacity:0;transform:scale(.2) rotate(-20deg)}20%{opacity:1;transform:scale(1.4) rotate(5deg)}50%{opacity:1;transform:scale(.95) rotate(-1deg)}100%{opacity:0;transform:scale(1.05) rotate(0)}}
.suit-complete-flash{position:fixed;inset:0;z-index:9995;pointer-events:none;display:flex;align-items:center;justify-content:center}
.suit-complete-flash .scf-inner{font-size:150px;line-height:1;animation:suitFlash 1s cubic-bezier(.22,1,.36,1) forwards;filter:drop-shadow(0 0 40px currentColor) drop-shadow(0 0 100px currentColor)}
@keyframes colourWash{0%{opacity:0}12%{opacity:.35}100%{opacity:0}}
.colour-wash{position:fixed;inset:0;z-index:9992;pointer-events:none;animation:colourWash .9s ease-out forwards}
@keyframes slotPulse{0%{transform:scale(1)}20%{transform:scale(1.18);box-shadow:0 0 40px var(--glow),0 0 80px var(--glow)}55%{transform:scale(.94)}100%{transform:scale(1);box-shadow:0 0 14px var(--glow)}}
.slot.suit-done{animation:slotPulse 1.5s cubic-bezier(.22,1,.36,1) forwards}
@keyframes comboPop{0%{opacity:0;transform:scale(.5) translateY(0)}18%{opacity:1;transform:scale(1.4) translateY(-8px)}55%{opacity:1;transform:scale(1.1) translateY(-24px)}100%{opacity:0;transform:scale(.85) translateY(-50px)}}
.spop{position:fixed;pointer-events:none;z-index:9996;font-family:'Lilita One',sans-serif;font-size:20px;animation:sfly .9s ease-out forwards;white-space:nowrap}
@keyframes sfly{0%{transform:translateY(0) scale(.75);opacity:1}75%{transform:translateY(-55px) scale(1.1);opacity:1}100%{transform:translateY(-75px);opacity:0}}
</style>
</head>
<body>
<div id="sf"></div>
<div id="wrap">
  <header>
    <div class="logo">SOLITAIRE</div>
    <div class="chip"><div class="v" id="sel">0</div><div class="l">Score</div></div>
    <div class="chip"><div class="v" id="mel">0</div><div class="l">Moves</div></div>
    <div class="chip"><div class="v" id="tel">0:00</div><div class="l">Time</div></div>
  </header>

  <div id="game">
    <div id="toprow">
      <div class="sw">
        <div class="slot" id="stock" style="cursor:default"><div class="si" style="color:var(--blue)">↺</div><div id="scnt"></div></div>
        <div class="slot" id="waste"></div>
      </div>
      <div class="sp"></div>
      <div class="fnds">
        <div class="slot" id="f0"></div>
        <div class="slot" id="f1"></div>
        <div class="slot" id="f2"></div>
        <div class="slot" id="f3"></div>
      </div>
    </div>
    <div id="tab"></div>
  </div>
</div>

<div id="cursor"></div>
<div id="combo-overlay"></div>
<div id="hot-streak"><div id="hs-label">🔥 HOT STREAK</div><div id="hs-dots"></div></div>

<script>
'use strict';

// Speed — 2.2x (10% slower than before for more readable movement)
let SPEED = 2.2;
const D = (ms) => ms / SPEED; // apply speed to all delays

// ── AUDIO ─────────────────────────────────────────
let AC = null;
let _rev = null;
function ac() {
  if (!AC) try { AC = new (window.AudioContext||window.webkitAudioContext)(); } catch{}
  if (AC?.state==='suspended') AC.resume();
  return AC;
}
function getRev() {
  if (_rev) return _rev;
  const a = ac(); if (!a) return null;
  const len = a.sampleRate * 1.2, buf = a.createBuffer(2, len, a.sampleRate);
  for (let c=0;c<2;c++){const d=buf.getChannelData(c);for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.8);}
  const n = a.createConvolver(); n.buffer=buf; _rev=n; return n;
}
function noise(dur, shape) {
  const a=ac(); if(!a) return null;
  const len=~~(a.sampleRate*dur), buf=a.createBuffer(1,len,a.sampleRate), d=buf.getChannelData(0);
  for(let i=0;i<len;i++) d[i]=(Math.random()*2-1)*(shape?shape(i/len):1);
  const src=a.createBufferSource(); src.buffer=buf; return src;
}
let _fndCount = 0;
function snd(type) {
  const a=ac(); if(!a) return;
  const t=a.currentTime;
  if (type==='place') {
    const sub=a.createOscillator(),sg=a.createGain(); sub.type='sine';
    sub.frequency.setValueAtTime(220,t); sub.frequency.exponentialRampToValueAtTime(55,t+.08);
    sg.gain.setValueAtTime(.28,t); sg.gain.exponentialRampToValueAtTime(.001,t+.1);
    sub.connect(sg); sg.connect(a.destination); sub.start(t); sub.stop(t+.11);
    const click=noise(.012,x=>Math.exp(-x*150)); if(!click) return;
    const cf=a.createBiquadFilter(); cf.type='highpass'; cf.frequency.value=3000;
    const cg=a.createGain(); cg.gain.setValueAtTime(.18,t); cg.gain.exponentialRampToValueAtTime(.001,t+.012);
    click.connect(cf); cf.connect(cg); cg.connect(a.destination); click.start(t);
  }
  if (type==='flip') {
    const snap=noise(.04,x=>x<.03?x/.03:Math.exp(-(x-.03)*40)); if(!snap) return;
    const sf=a.createBiquadFilter(); sf.type='bandpass'; sf.frequency.value=2200; sf.Q.value=.7;
    const sg=a.createGain(); sg.gain.setValueAtTime(.2,t); sg.gain.exponentialRampToValueAtTime(.001,t+.04);
    snap.connect(sf); sf.connect(sg); sg.connect(a.destination); snap.start(t);
    const ch=a.createOscillator(),cg=a.createGain(); ch.type='sine';
    ch.frequency.setValueAtTime(400,t); ch.frequency.exponentialRampToValueAtTime(900,t+.07);
    cg.gain.setValueAtTime(.08,t); cg.gain.exponentialRampToValueAtTime(.001,t+.08);
    ch.connect(cg); cg.connect(a.destination); ch.start(t); ch.stop(t+.09);
  }
  if (type==='foundation') {
    const sem=Math.min(_fndCount,24), root=440*Math.pow(2,sem/12);
    _fndCount++;
    const rev=getRev(); if(rev) rev.connect(a.destination);
    [1,2,3,4.2].forEach((r,i)=>{
      const o=a.createOscillator(),g=a.createGain(); o.type='sine'; o.frequency.value=root*r;
      const st=t+i*.012, v=[.18,.1,.06,.03][i];
      g.gain.setValueAtTime(0,st); g.gain.linearRampToValueAtTime(v,st+.015); g.gain.exponentialRampToValueAtTime(.001,st+.55-i*.08);
      o.connect(g); g.connect(a.destination);
      if(rev){const rg=a.createGain();rg.gain.value=.18;g.connect(rg);rg.connect(rev);}
      o.start(st); o.stop(st+.6);
    });
  }
  if (type==='deal') {
    const o=a.createOscillator(),g=a.createGain(); o.type='sine';
    o.frequency.setValueAtTime(700+Math.random()*300,t); o.frequency.exponentialRampToValueAtTime(180,t+.08);
    g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.09);
    o.connect(g); g.connect(a.destination); o.start(t); o.stop(t+.1);
  }
  if (type==='suitcomplete') {
    const rev=getRev(); if(rev) rev.connect(a.destination);
    [261.6,329.6,392,523.3,659.3].forEach((freq,i)=>{
      const o=a.createOscillator(),g=a.createGain(); o.type=i===0?'sine':'triangle'; o.frequency.value=freq;
      g.gain.setValueAtTime(.22-i*.03,t); g.gain.exponentialRampToValueAtTime(.001,t+.8-i*.05);
      o.connect(g); g.connect(a.destination);
      if(rev){const rs=a.createGain();rs.gain.value=.35;g.connect(rs);rs.connect(rev);}
      o.start(t); o.stop(t+.85);
    });
    [523.3,659.3,783.9,1046.5,1318.5].forEach((freq,i)=>{
      const st=t+.08+i*.06, o=a.createOscillator(),g=a.createGain();
      o.type='sine'; o.frequency.value=freq;
      g.gain.setValueAtTime(.12,st); g.gain.exponentialRampToValueAtTime(.001,st+.25);
      o.connect(g); g.connect(a.destination); o.start(st); o.stop(st+.28);
    });
    const sub=a.createOscillator(),sg=a.createGain(); sub.type='sine';
    sub.frequency.setValueAtTime(80,t); sub.frequency.exponentialRampToValueAtTime(40,t+.15);
    sg.gain.setValueAtTime(.3,t); sg.gain.exponentialRampToValueAtTime(.001,t+.18);
    sub.connect(sg); sg.connect(a.destination); sub.start(t); sub.stop(t+.2);
  }
}
document.addEventListener('pointerdown',()=>{ac()?.state==='suspended'&&ac()?.resume()},{once:true,capture:true});

// ── STARS ─────────────────────────────────────────
(() => {
  const sf = document.getElementById('sf');
  for (let i=0;i<80;i++){const s=document.createElement('div');s.className='star';const z=Math.random()*2+.3;s.style.cssText=`width:${z}px;height:${z}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${2+Math.random()*5}s;--dl:${Math.random()*6}s;opacity:.06`;sf.appendChild(s);}
})();

// ── GAME ENGINE ───────────────────────────────────
function rng32(seed){return()=>{seed=seed+0x6D2B79F5|0;let t=Math.imul(seed^seed>>>15,1|seed);t=t+Math.imul(t^t>>>7,61|t)^t;return((t^t>>>14)>>>0)/4294967296;}}
function shuffleSeed(arr,seed){const r=rng32(seed),b=[...arr];for(let i=b.length-1;i>0;i--){const j=~~(r()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function isSolvable(seed){const deck=[];for(let s=0;s<4;s++)for(let r=1;r<=13;r++)deck.push({s,r,c:s===1||s===2?1:0});const d=shuffleSeed(deck,seed);const tab=[];let i=0;for(let c=0;c<7;c++){const p=[];for(let j=0;j<=c;j++)p.push({...d[i++],up:j===c});tab.push(p);}const stock=d.slice(i);let fu=0;for(const col of tab)for(const c of col)if(c.up)fu++;if(fu<7)return false;const sr=stock.filter(c=>c.c===1).length;if(!sr||sr===stock.length)return false;let ace=0;for(const col of tab)if(col.length&&col[col.length-1].r===1)ace++;for(let k=Math.max(0,stock.length-15);k<stock.length;k++)if(stock[k].r===1)ace++;if(!ace)return false;let seq=0;for(const col of tab)for(let k=col.length-1;k>0;k--){const a=col[k],b=col[k-1];if(a.up&&b.up&&a.r===b.r-1&&a.c!==b.c)seq++;else break;}return seq>=2;}
function getDailySeed(){const n=new Date();const base=n.getFullYear()*10000+(n.getMonth()+1)*100+n.getDate();for(let off=0;off<200;off++){const s=base*1000+off;if(isSolvable(s))return s;}return base*1000;}

// ── CURSOR ANIMATION ──────────────────────────────
const cur = document.getElementById('cursor');
// ── HUMAN CURSOR MOVEMENT ─────────────────────────
// Moves cursor along a quadratic bezier with:
// - Random control point off the straight line (creates curves)
// - Slight overshoot on fast moves
// - Micro-jitter at destination simulating finger settling
// - Variable speed profile (ease-in-out with random variance)

let _curX = 200, _curY = 200;
let _curAnim = null;

function setCursorPos(x, y) {
  cur.style.left = x + 'px';
  cur.style.top  = y + 'px';
  _curX = x; _curY = y;
}

// Cubic ease-in-out
function easeInOut(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

// Move cursor from current pos to (tx,ty) over `duration` ms
// Returns a promise that resolves when movement completes
function moveCursorTo(tx, ty, duration) {
  return new Promise(resolve => {
    if (_curAnim) { cancelAnimationFrame(_curAnim); _curAnim = null; }

    const sx = _curX, sy = _curY;
    const dist = Math.hypot(tx - sx, ty - sy);

    // Control point — offset perpendicular to the line of travel
    // More offset for longer distances, less for short hops
    const perpOffset = (dist * 0.12 + 8) * (Math.random() < 0.5 ? 1 : -1);
    const mx = (sx + tx) / 2, my = (sy + ty) / 2;
    const angle = Math.atan2(ty - sy, tx - sx) + Math.PI / 2;
    const cpx = mx + Math.cos(angle) * perpOffset * (0.5 + Math.random() * 0.8);
    const cpy = my + Math.sin(angle) * perpOffset * (0.5 + Math.random() * 0.8);

    // Optional slight overshoot: 20% of moves overshoot by 3-8px
    const overshoot = Math.random() < 0.2 ? (3 + Math.random() * 5) : 0;
    const ovDir = Math.atan2(ty - sy, tx - sx);
    const endX = tx + Math.cos(ovDir) * overshoot;
    const endY = ty + Math.sin(ovDir) * overshoot;

    // Add tiny random variance to target to avoid pixel-perfect landing
    const jx = (Math.random() - 0.5) * 4;
    const jy = (Math.random() - 0.5) * 4;
    const finalX = tx + jx, finalY = ty + jy;

    const start = performance.now();

    function step(now) {
      const raw = Math.min(1, (now - start) / duration);
      const t = easeInOut(raw);

      // Quadratic bezier: B(t) = (1-t)²·P0 + 2(1-t)t·CP + t²·P1
      const inv = 1 - t;
      let x = inv*inv*sx + 2*inv*t*cpx + t*t*endX;
      let y = inv*inv*sy + 2*inv*t*cpy + t*t*endY;

      // Micro-jitter in final 15% of movement — finger settling
      if (raw > 0.85) {
        const settle = (raw - 0.85) / 0.15;
        x += (1 - settle) * (Math.random() - 0.5) * 2.5;
        y += (1 - settle) * (Math.random() - 0.5) * 2.5;
      }

      setCursorPos(x, y);

      if (raw < 1) {
        _curAnim = requestAnimationFrame(step);
      } else {
        // Snap to exact final position after overshoot settles
        if (overshoot > 0) {
          setTimeout(() => {
            setCursorPos(finalX, finalY);
            resolve();
          }, 40);
        } else {
          setCursorPos(finalX, finalY);
          resolve();
        }
      }
    }
    _curAnim = requestAnimationFrame(step);
  });
}

// moveCursor: instant set (for initialising position off-screen)
// or use moveTo for animated movement
function moveCursor(x, y, grab=false) {
  cur.style.display = 'block';
  setCursorPos(x, y);
  cur.classList.toggle('grabbing', grab);
}

// The main one used in executeMove — animated travel
function moveCursorAnimate(x, y, grab=false, speedMult=1) {
  const dist = Math.hypot(x - _curX, y - _curY);
  // Duration: 80ms minimum, scales with distance but capped at 260ms
  // Human hand moves faster for long distances (proportionally)
  const baseDur = Math.min(260, Math.max(80, dist * 0.55)) * speedMult;
  cur.style.display = 'block';
  cur.classList.toggle('grabbing', grab);
  return moveCursorTo(x, y, baseDur / SPEED);
}

function hideCursor() { cur.style.display = 'none'; }

// ── SOLVER ────────────────────────────────────────
// Scores every possible move by how much it improves the board.
// Only takes moves with positive progress. Never retreats.

function validFnd(card){
  for(let i=0;i<4;i++){
    const p=G.fnd[i];
    if(!p.length&&card.val===1)return i;
    if(p.length){const t=p[p.length-1];if(t.si===card.si&&card.val===t.val+1)return i;}
  }
  return -1;
}
function canTab(card,col){
  const p=G.tab[col];
  if(!p.length)return card.val===13;
  const t=p[p.length-1];
  return t.up&&t.color!==card.color&&card.val===t.val-1;
}

// Score the current board state — higher = closer to winning
function boardScore(tab, fnd, waste){
  let s = 0;
  // Foundation cards are the goal — heavily reward them
  for(const p of fnd) s += p.length * 20;
  // Face-up cards in tableau are accessible — reward them
  for(const col of tab){
    for(const c of col) if(c.up) s += 2;
  }
  // Penalise face-down cards
  for(const col of tab){
    for(const c of col) if(!c.up) s -= 5;
  }
  return s;
}

// Simulate a move on a deep copy of state, return new board score
function scoreMove(move){
  // Deep copy state
  const tab = G.tab.map(col => col.map(c=>({...c})));
  const fnd = G.fnd.map(p => p.map(c=>({...c})));
  const waste = [...G.waste];
  const stock = [...G.stock];

  if(move.type==='waste-fnd'){
    const c=waste.pop();
    fnd[move.fi].push(c);
  } else if(move.type==='tab-fnd'){
    const c=tab[move.col].pop();
    fnd[move.fi].push(c);
    // Flip top of source
    if(tab[move.col].length && !tab[move.col][tab[move.col].length-1].up)
      tab[move.col][tab[move.col].length-1].up=true;
  } else if(move.type==='tab-tab'){
    const cards=tab[move.fc].splice(move.fi);
    tab[move.tc].push(...cards);
    if(tab[move.fc].length && !tab[move.fc][tab[move.fc].length-1].up)
      tab[move.fc][tab[move.fc].length-1].up=true;
  } else if(move.type==='waste-tab'){
    const c=waste.pop();
    tab[move.tc].push(c);
  } else if(move.type==='stock'){
    if(!stock.length){
      // recycle
      while(waste.length){const c=waste.pop();c.up=false;stock.push(c);}
    } else {
      const c=stock.pop();c.up=true;waste.push(c);
    }
  }
  return boardScore(tab, fnd, waste);
}

function findBestMove(){
  const currentScore = boardScore(G.tab, G.fnd, G.waste);
  const candidates = [];

  // Foundation moves — always include, they always increase board score
  if(G.waste.length){
    const w=G.waste[G.waste.length-1];
    const fi=validFnd(w);
    if(fi!==-1) candidates.push({type:'waste-fnd',card:w,fi});
  }
  for(let col=0;col<7;col++){
    const p=G.tab[col];if(!p.length)continue;
    const t=p[p.length-1];if(!t.up)continue;
    const fi=validFnd(t);
    if(fi!==-1) candidates.push({type:'tab-fnd',col,card:t,fi});
  }

  // Tableau unblock moves — only if they flip a face-down card
  for(let fc=0;fc<7;fc++){
    const fp=G.tab[fc];
    const hasFaceDown=fp.some(c=>!c.up);
    if(!hasFaceDown)continue;
    for(let fi=fp.length-1;fi>=0;fi--){
      if(!fp[fi].up)break;
      for(let tc=0;tc<7;tc++){
        if(tc===fc||!canTab(fp[fi],tc))continue;
        candidates.push({type:'tab-tab',fc,fi,tc,cards:fp.slice(fi)});
      }
    }
  }

  // Waste to tableau
  if(G.waste.length){
    const w=G.waste[G.waste.length-1];
    for(let tc=0;tc<7;tc++){
      if(canTab(w,tc)) candidates.push({type:'waste-tab',card:w,tc});
    }
  }

  // Score every candidate — only take moves that improve the board
  let bestMove=null, bestScore=currentScore;
  for(const m of candidates){
    const s=scoreMove(m);
    if(s>bestScore){ bestScore=s; bestMove=m; }
  }

  // If a genuinely improving move exists, take it
  if(bestMove) return bestMove;

  // No improving tableau move — draw from stock to get new options
  if(G.stock.length||G.waste.length) return{type:'stock'};
  return null;
}

// ── HUMAN-LIKE CLICK POSITIONS ────────────────────
// Real players don't click dead centre every time.
// They land slightly differently depending on speed,
// which card it is, and where they came from last.

let _lastPos = { x: 200, y: 200 };

// Jitter: biased toward upper-left third of card (where rank label is)
// since that's where a player's eye goes to identify the card.
// Occasionally overshoots toward centre or slightly off.
function humanPos(rect, role) {
  const w = rect.width, h = rect.height;
  let bx, by;

  if (role === 'grab') {
    // Picking up a card — tend to grab upper portion where rank is visible
    // Bias: 30-70% across, 20-50% down
    bx = rect.left + w * (0.28 + Math.random() * 0.44);
    by = rect.top  + h * (0.18 + Math.random() * 0.32);
  } else if (role === 'drop') {
    // Dropping onto a slot or card — aim roughly centre but loose
    bx = rect.left + w * (0.25 + Math.random() * 0.50);
    by = rect.top  + h * (0.22 + Math.random() * 0.45);
  } else {
    // Hover/tap — centre with small drift
    bx = rect.left + w * (0.35 + Math.random() * 0.30);
    by = rect.top  + h * (0.35 + Math.random() * 0.30);
  }

  // Occasionally add a small "approach drift" — cursor comes in from
  // the direction of the last position, not perfectly accurate
  const driftChance = Math.random();
  if (driftChance < 0.3) {
    // Slight overshoot toward last position
    const dx = (_lastPos.x - bx) * 0.08;
    const dy = (_lastPos.y - by) * 0.08;
    bx += dx; by += dy;
  }

  _lastPos = { x: bx, y: by };
  return { x: Math.round(bx), y: Math.round(by) };
}

function getSlotPos(id, role='drop') {
  const el=document.getElementById(id);
  if(!el) return{x:200,y:200};
  return humanPos(el.getBoundingClientRect(), role);
}

function getCardPos(col, idx, role='grab') {
  const tabEl=document.getElementById('tab');
  const ce=tabEl?.querySelector(`.tcol[data-col="${col}"]`);
  if(!ce) return{x:200,y:200};
  const cards=ce.querySelectorAll('.card');
  const card=cards[idx];
  if(!card) return{x:200,y:200};
  return humanPos(card.getBoundingClientRect(), role);
}

function getWastePos(role='grab') {
  const el=document.getElementById('waste');
  const cards=el?.querySelectorAll('.card');
  if(!cards?.length) return{x:200,y:200};
  const top=cards[cards.length-1];
  return humanPos(top.getBoundingClientRect(), role);
}

function getFndPos(i) { return getSlotPos(`f${i}`, 'drop'); }

function getTabDropPos(tc) {
  const tabEl=document.getElementById('tab');
  const tcEl=tabEl?.querySelector(`.tcol[data-col="${tc}"]`);
  if(!tcEl) return{x:200,y:200};
  const pile=G.tab[tc];
  if(pile.length===0) {
    // Empty column — drop toward top
    const r=tcEl.getBoundingClientRect();
    return humanPos({left:r.left,top:r.top,width:r.width,height:95},'drop');
  }
  // Drop onto top card
  const cards=tcEl.querySelectorAll('.card');
  const top=cards[cards.length-1];
  if(!top) return{x:200,y:200};
  return humanPos(top.getBoundingClientRect(),'drop');
}

// ── ANIMATE CARD ELEMENTS ─────────────────────────
function animateCard(col){const ce=document.getElementById('tab')?.querySelector(`.tcol[data-col="${col}"]`);if(!ce)return;const cards=ce.querySelectorAll('.card.up');const top=cards[cards.length-1];if(!top)return;top.classList.remove('placed');void top.offsetWidth;top.classList.add('placed');setTimeout(()=>top.classList.remove('placed'),300);}
function animateFnd(fi){const slot=document.getElementById(`f${fi}`);const card=slot?.querySelector('.card');if(!card)return;card.classList.remove('fnd-pop');void card.offsetWidth;card.classList.add('fnd-pop');setTimeout(()=>card.classList.remove('fnd-pop'),400);}
function animateReveal(col){const ce=document.getElementById('tab')?.querySelector(`.tcol[data-col="${col}"]`);if(!ce)return;const cards=ce.querySelectorAll('.card.up');const top=cards[cards.length-1];if(!top)return;top.classList.remove('reveal-pop');void top.offsetWidth;top.classList.add('reveal-pop');setTimeout(()=>top.classList.remove('reveal-pop'),350);}

// ── EXECUTE MOVES WITH ANIMATION ──────────────────
function flipTop(col){const p=G.tab[col];if(p.length&&!p[p.length-1].up){p[p.length-1].up=true;score+=5;upScore();render();setTimeout(()=>animateReveal(col),50);snd('flip');}}

async function executeMove(move) {
  startTick();
  const tabEl=document.getElementById('tab');

  if(move.type==='stock'){
    comboReset();
    if(!G.stock.length){G.stock=[...G.waste].reverse().map(c=>({...c,up:false}));G.waste=[];score-=100;}
    else{const c=G.stock.pop();c.up=true;G.waste.push(c);score+=5;}
    moves++;upScore();render();
    const sp=getSlotPos('stock','tap');
    await moveCursorAnimate(sp.x, sp.y, false);
    await wait(D(60));
    moveCursor(sp.x, sp.y, true);
    await wait(D(80));
    moveCursor(sp.x, sp.y, false);
    await wait(D(60));
    return;
  }

  if(move.type==='waste-fnd'){
    const{card,fi}=move;
    const wp=getWastePos('grab'), fp=getFndPos(fi);
    await moveCursorAnimate(wp.x, wp.y, false);
    await wait(D(55));
    moveCursor(wp.x, wp.y, true);
    await wait(D(55));
    await moveCursorAnimate(fp.x, fp.y, true);
    await wait(D(45));
    moveCursor(fp.x, fp.y, false);
    await wait(D(40));
    G.waste.pop();G.fnd[fi].push(card);score+=15;moves++;upScore();
    const isKing=card.val===13;
    render();
    if(isKing)setTimeout(()=>suitComplete(card.suit,card.color==='red'),D(100));
    else{setTimeout(()=>{animateFnd(fi);fndBurst(fp.x,fp.y);},40);snd('foundation');}
    comboHit(fp.x,fp.y);
    return;
  }

  if(move.type==='tab-fnd'){
    const{col,card,fi}=move;
    const cp=getCardPos(col,G.tab[col].length-1,'grab'), fp=getFndPos(fi);
    await moveCursorAnimate(cp.x, cp.y, false);
    await wait(D(55));
    moveCursor(cp.x, cp.y, true);
    await wait(D(55));
    await moveCursorAnimate(fp.x, fp.y, true);
    await wait(D(45));
    moveCursor(fp.x, fp.y, false);
    await wait(D(40));
    G.tab[col].pop();G.fnd[fi].push(card);score+=10;moves++;upScore();
    flipTop(col);
    const isKing=card.val===13;
    render();
    if(isKing)setTimeout(()=>suitComplete(card.suit,card.color==='red'),D(100));
    else{setTimeout(()=>{animateFnd(fi);fndBurst(fp.x,fp.y);},40);snd('foundation');}
    comboHit(fp.x,fp.y);
    return;
  }

  if(move.type==='tab-tab'){
    const{fc,fi,tc,cards}=move;
    const cp=getCardPos(fc,fi,'grab');
    const tpPos=getTabDropPos(tc);
    await moveCursorAnimate(cp.x, cp.y, false);
    await wait(D(50));
    // Occasional micro-hover before grab
    if(Math.random() < 0.25) {
      await moveCursorAnimate(cp.x+(Math.random()*5-2.5), cp.y+(Math.random()*4-2), false, 0.4);
      await wait(D(45));
      await moveCursorAnimate(cp.x, cp.y, false, 0.3);
      await wait(D(30));
    }
    moveCursor(cp.x, cp.y, true);
    await wait(D(50));
    await moveCursorAnimate(tpPos.x, tpPos.y, true);
    await wait(D(40));
    moveCursor(tpPos.x, tpPos.y, false);
    await wait(D(35));
    const moved=G.tab[fc].splice(fi);G.tab[tc].push(...moved);score+=5;moves++;upScore();
    flipTop(fc);render();
    setTimeout(()=>{animateCard(tc);tabBurst(tpPos.x,tpPos.y,cards[0].color==='red');},40);
    snd('place');comboHit(tpPos.x,tpPos.y);
    return;
  }

  if(move.type==='waste-tab'){
    const{card,tc}=move;
    const wp=getWastePos('grab');
    const tpPos=getTabDropPos(tc);
    await moveCursorAnimate(wp.x, wp.y, false);
    await wait(D(50));
    moveCursor(wp.x, wp.y, true);
    await wait(D(50));
    await moveCursorAnimate(tpPos.x, tpPos.y, true);
    await wait(D(40));
    moveCursor(tpPos.x, tpPos.y, false);
    await wait(D(35));
    G.waste.pop();G.tab[tc].push(card);score+=5;moves++;upScore();
    render();
    setTimeout(()=>{animateCard(tc);tabBurst(tpPos.x,tpPos.y,card.color==='red');},40);
    snd('place');comboHit(tpPos.x,tpPos.y);
    return;
  }
}

function wait(ms){return new Promise(r=>setTimeout(r,ms));}

function stateHash(){
  return G.tab.map(c=>c.map(x=>(x.up?'1':'0')+x.id).join('')).join('|')
    +'::'+G.waste.map(c=>c.id).join(',')
    +'::'+G.fnd.map(p=>p.length).join(',');
}

function simHash(move){
  const tab=G.tab.map(c=>[...c]);
  const waste=[...G.waste];
  const fnd=G.fnd.map(p=>[...p]);
  const stk=[...G.stock];
  if(move.type==='waste-fnd'){fnd[move.fi].push(waste.pop());}
  else if(move.type==='tab-fnd'){const c=tab[move.col].pop();fnd[move.fi].push(c);if(tab[move.col].length)tab[move.col][tab[move.col].length-1].up=true;}
  else if(move.type==='tab-tab'){const c=tab[move.fc].splice(move.fi);tab[move.tc].push(...c);if(tab[move.fc].length)tab[move.fc][tab[move.fc].length-1].up=true;}
  else if(move.type==='waste-tab'){tab[move.tc].push(waste.pop());}
  else if(move.type==='stock'){if(!stk.length){while(waste.length){const c=waste.pop();c.up=false;stk.push(c);}}else{const c=stk.pop();c.up=true;waste.push(c);}}
  return tab.map(c=>c.map(x=>(x.up?'1':'0')+x.id).join('')).join('|')
    +'::'+waste.map(c=>c.id).join(',')
    +'::'+fnd.map(p=>p.length).join(',');
}

// ── SOLVE LOOP ────────────────────────────────────
let solving=false, _restartTimer=null;

async function solve(){
  if(solving)return;
  solving=true;
  const visited=new Set();
  let stockDraws=0;

  while(solving){
    if(G.fnd.every(f=>f.length===13)){
      hideCursor();
      await wait(D(1500));
      solving=false;
      _restartTimer=setTimeout(()=>demoRestart(),D(2500));
      return;
    }

    visited.add(stateHash());

    // Get all possible moves this turn
    const candidates=[];

    // Foundation always top priority
    if(G.waste.length){const w=G.waste[G.waste.length-1];const fi=validFnd(w);if(fi!==-1)candidates.push({type:'waste-fnd',card:w,fi,pri:100});}
    for(let col=0;col<7;col++){const p=G.tab[col];if(!p.length)continue;const t=p[p.length-1];if(!t.up)continue;const fi=validFnd(t);if(fi!==-1)candidates.push({type:'tab-fnd',col,card:t,fi,pri:100});}

    // Tableau unblock — only if flips a face-down card
    for(let fc=0;fc<7;fc++){
      const fp=G.tab[fc];
      if(!fp.some(c=>!c.up))continue;
      for(let fi=fp.length-1;fi>=0;fi--){
        if(!fp[fi].up)break;
        for(let tc=0;tc<7;tc++){
          if(tc===fc||!canTab(fp[fi],tc))continue;
          const fd=fp.filter(c=>!c.up).length;
          candidates.push({type:'tab-tab',fc,fi,tc,cards:fp.slice(fi),pri:50+fd});
        }
      }
    }

    // Waste to tableau
    if(G.waste.length){const w=G.waste[G.waste.length-1];for(let tc=0;tc<7;tc++){if(canTab(w,tc))candidates.push({type:'waste-tab',card:w,tc,pri:20});}}

    // Sort by priority descending
    candidates.sort((a,b)=>b.pri-a.pri);

    // Pick the highest-priority move that leads to an UNVISITED state
    let move=null;
    for(const m of candidates){
      const h=simHash(m);
      if(!visited.has(h)){move=m;break;}
    }

    // All tableau moves lead to visited states — draw stock for new options
    if(!move){
      if(G.stock.length||G.waste.length){
        move={type:'stock'};
        stockDraws++;
        if(stockDraws>(G.stock.length+G.waste.length+1)*3){
          solving=false;setTimeout(()=>demoRestart(),D(1000));return;
        }
      } else {
        solving=false;setTimeout(()=>demoRestart(),D(1000));return;
      }
    } else {
      if(move.type!=='stock') stockDraws=0;
    }

    const isBig=move.type==='tab-tab'&&move.cards?.length>1;
    await wait(isBig?D(160)+Math.random()*D(80):D(65)+Math.random()*D(80));
    if(!solving)return;
    await executeMove(move);
    await wait(D(30));
  }
}

// ── START / RESTART ───────────────────────────────
// Track used seeds so we never repeat a game in the same session
const _usedSeeds = new Set();
let _seedCounter = Math.floor(Math.random() * 9999999);

function nextUniqueSeed() {
  for (let attempts = 0; attempts < 10000; attempts++) {
    _seedCounter = (_seedCounter + 1 + Math.floor(Math.random() * 97)) % 9999999;
    const s = _seedCounter * 1000 + Math.floor(Math.random() * 100);
    if (!_usedSeeds.has(s) && isSolvable(s)) {
      _usedSeeds.add(s);
      // Keep set small — only remember last 50 seeds
      if (_usedSeeds.size > 50) _usedSeeds.delete(_usedSeeds.values().next().value);
      return s;
    }
  }
  // Fallback — just use something solvable even if seen before
  for (let s = 1; s < 99999999; s += 997) { if (isSolvable(s)) return s; }
  return 42000;
}

let currentSeed = 0;
async function demoRestart(){
  solving=false;clearTimeout(_restartTimer);
  COMBO.count=0;updateStreakBar();hideCursor();
  currentSeed = nextUniqueSeed();
  initGame(currentSeed);
  await dealAnimation();
  await wait(D(800));
  solve();
}

// ── INIT ──────────────────────────────────────────
demoRestart();
